    title: "Atmospheric Drag Physics"
    source_stages: [stage_1_architecture, stage_3_benchmarking]
    file_anchor: "src/core/entities.js (PooledParticle.update)"
    current_state: "Constant baseFriction (0.952) applied every frame."
    proposed_state: "Drag scales with velocity squared (F = -kv^2), making fast bursts slow down realistically."
    impact_hypothesis: "medium — adds weight and realism to particle movement."
    effort_estimate: "S — ~10 lines in update loop."
    evidence_class: "practitioner"
