<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Premium Fireworks - True Delta Edition</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020206;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #hint, #status {
      position: absolute;
      left: 0;
      width: 100%;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      pointer-events: none;
      z-index: 10;
      transition: opacity 1.6s ease;
    }

    #hint {
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.42);
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #status {
      top: 18px;
      color: rgba(255,255,255,0.22);
      font-size: 0.72rem;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      opacity: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      #hint { transition: opacity 0.6s ease; }
    }
  </style>
</head>
<body>
  <div id="hint">Hold to Charge</div>
  <div id="status"></div>
  <canvas id="fwCanvas" role="img" aria-label="Fireworks display"></canvas>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
