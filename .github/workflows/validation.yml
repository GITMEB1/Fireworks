name: Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deterministic-calibration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deterministic validation lane
        run: npm run validate

      - name: Upload calibration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-calibration-artifacts
          path: |
            fireworks-engine/runs/latest-deterministic-calibration-data.json
            fireworks-engine/runs/latest-deterministic-calibration-pass.md
