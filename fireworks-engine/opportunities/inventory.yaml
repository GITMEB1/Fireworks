    seam_targets: [input, behavior, render]
    anchors:
      - src/systems/inputSystem.js
      - src/shells/registry.js
    summary: Convert hard fizzle into unstable but rewarding burst to reduce frustration.

  - id: OPP-003
    title: Supernova Hit-Stop Micro-pause
    seam_targets: [core_simulation, render]
    anchors:
      - src/core/engine.js
    summary: Add tiny pause at peak impact to increase perceived force.

